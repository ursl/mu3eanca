# Shared relval defaults (machine-independent).
# Host-specific paths: config-<hostname>.yaml (e.g. config-moor.yaml, config-mu3edb0.yaml).
# Override host: RELVAL_HOST=moor  or  ./runRelval --host moor ...

mu3e_repo: "git@bitbucket.org:mu3e/mu3e"
mu3e_tag: "v6.5"
# Optional: track origin/<branch> HEAD instead of a release tag (overrides mu3e_checkout_tag).
# mu3e_checkout_branch: "dev"
# Optional: merge PR / cherry-pick commits after checkout (repeatable; composes with branch or tag).
# mu3e_checkout_merge: "75d8c48"
# mu3e_checkout_merges:
#   - "75d8c48"
# mu3eUtil_checkout_merge: "a1b2c3d4"
# mu3eUtil_checkout_merges:
#   - "a1b2c3d4"
mu3e_dir: "mu3e"
make_jobs: 10

run_id: 1234
n_events: 5000

sim_scenarios:
#  - id: "cosmic_twolayer"
#    sim_conf: "sim_cosmic.json"
#    trirec_conf: "trirec_twolayer_cosmic.conf"
#  - id: "cosmic_threelayer"
#    sim_conf: "sim_cosmic.json"
#    trirec_conf: "trirec_threelayer_cosmic.conf"
#  - id: "conf8_twolayer"
#    sim_conf: "bvr2026/sim_conf8.json"
#    trirec_conf: "trirec_twolayer_beam.conf"

#  - id: "conf10_twolayer"
#    sim_conf: "bvr2026/sim_conf10.json"
#    trirec_conf: "trirec_twolayer_beam.conf"
#    trirec_conf_fallback: "trirec.conf"
#  - id: "conf18_threelayer"
#    sim_conf: "bvr2026/sim_conf18.json"
#    trirec_conf: "trirec_threelayer_beam.conf"
#    trirec_conf_fallback: "trirec.conf"
  - id: "signal"
    sim_conf: "sim_signal.json"
    trirec_conf: "trirec.conf"

sim_output_tpl: "output/sim-{scenario}.root"
sort_output_tpl: "output/sort-{scenario}.root"
trirec_output_tpl: "output/trirec-{scenario}.root"
fillhist_output_tpl: "output/histograms-{scenario}.root"
compare_marker_tpl: "output/compare-{scenario}.done"
histocompare_marker_tpl: "output/histocompare-{scenario}.done"

cdb_GT: "mcidealv6.5"

# Optional compare mode:
# if compare_against_setup is non-empty, runCompareHistograms is executed
# against histogram files from that setup.
compare_against_setup: ""
