# Shared relval defaults (machine-independent).
# Host-specific paths: config-<hostname>.yaml (e.g. config-moor.yaml, config-mu3edb0.yaml).
# Override host: RELVAL_HOST=moor  or  ./initRelval --host moor ...

mu3e_repo: "git@bitbucket.org:mu3e/mu3e"
mu3e_tag: "v6.5"
# Optional: track origin/<branch> HEAD instead of a release tag (overrides mu3e_checkout_tag).
# mu3e_checkout_branch: "dev"
# Optional: merge branch/tag/commit after checkout (repeatable; composes with branch or tag).
# mu3e_checkout_merge_branch: "CDB-v6.9pre"
# mu3e_checkout_merge: "75d8c48"
# mu3e_checkout_merges:
#   - "CDB-v6.9pre"
# mu3eUtil_checkout_merge_branch: "my-util-branch"
# mu3eUtil_checkout_merge: "a1b2c3d4"
# mu3eUtil_checkout_merges:
#   - "a1b2c3d4"
mu3e_dir: "mu3e"
make_jobs: 10

# Completion markers under workdir (visible with plain ls).
marker_dir: "markers"

# Defaults for sim tasks (overridable per task).
run_id: 1234
n_events: 5000

# Optional prefix for relative raw_input paths on data tasks (set on host config).
raw_input_base: ""
# Raw MID layout under raw_input_base: flat | runblock3 | runblock4 (see prod/rereco).
raw_input_layout: "flat"

# Output templates ({task} or legacy {scenario}).
sim_output_tpl: "output/sim-{task}.root"
sort_output_tpl: "output/sort-{task}.root"
trirec_output_tpl: "output/trirec-{task}.root"
fillhist_output_tpl: "output/histograms-{task}.root"
compare_marker_tpl: "output/compare-{task}.done"
histocompare_marker_tpl: "output/histocompare-{task}.done"

# Fallback GT when a task omits cdb_GT (each task should set its own).
cdb_GT: "mcidealv6.5"

# Reference setup name (directory suffix under mu3e_relval_basedir) for compare/histocompare.
compare_against_setup: ""

# --- Relval tasks (recommended) ---
# mode: sim  -> mu3eSim, mu3eSort, mu3eTrirec, fillhist, treedump, [compare, histocompare]
# mode: data -> raw_input (host) -> mu3eSort -> local output/sort-{task}.root -> ...
relval_tasks:
  - id: signal
    mode: sim
    sim_conf: sim_signal.json
    trirec_conf: trirec.conf
    cdb_GT: mcidealv6.9
    run_id: 1234
    n_events: 5000

  - id: conf8
    mode: sim
    sim_conf: bvr2026/sim_conf8.json
    trirec_conf: trirec_twolayer_beam.conf
    cdb_GT: mcrealisticv6.9=2025V0
    run_id: 1234
    n_events: 5000

  - id: run06232
    mode: data
    run_id: 6232
    trirec_conf: trirec_twolayer_beam.conf
    cdb_GT: datav6.9=2025V0
    # Relative to raw_input_base (host config), or absolute path:
    raw_input: "run06232.mid.lz4"

# Legacy alias (used only when relval_tasks is empty):
sim_scenarios: []
